<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#0d1117" rx="8"/>

  <!-- Title -->
  <text x="70" y="30" fill="#c9d1d9" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold">Claude's Paper Trading — Equity Curve</text>
  <text x="70" y="48" fill="#58a6ff" font-family="system-ui, sans-serif" font-size="12">
    $10,000.00 (+0.00%) | Win Rate: 0/0 | Realized: $+0.00
  </text>

  <!-- Grid lines -->
  <line x1="70" y1="320.0" x2="770" y2="320.0" stroke="#21262d" stroke-width="0.5"/><line x1="70" y1="268.0" x2="770" y2="268.0" stroke="#21262d" stroke-width="0.5"/><line x1="70" y1="216.0" x2="770" y2="216.0" stroke="#21262d" stroke-width="0.5"/><line x1="70" y1="164.0" x2="770" y2="164.0" stroke="#21262d" stroke-width="0.5"/><line x1="70" y1="112.0" x2="770" y2="112.0" stroke="#21262d" stroke-width="0.5"/><line x1="70" y1="60.0" x2="770" y2="60.0" stroke="#21262d" stroke-width="0.5"/>

  <!-- Baseline (starting capital) -->
  <line x1="70" y1="190.0" x2="770" y2="190.0" stroke="#c9d1d9" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="775" y="190.0" fill="#c9d1d9" font-size="9" opacity="0.6" dominant-baseline="middle">$10K</text>

  <!-- Fill under curve -->
  <path d="M 420.0 190.0 L 420.0 320.0 L 420.0 320.0 Z" fill="#16a34a" opacity="0.1"/>

  <!-- Equity line -->
  <path d="M 420.0 190.0" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data points -->
  <circle cx="420.0" cy="190.0" r="3" fill="#16a34a"/>

  <!-- Trade markers -->
  

  <!-- Y-axis labels -->
  <text x="62" y="320.0" fill="#c9d1d9" font-size="10" text-anchor="end" dominant-baseline="middle">$9,500</text><text x="62" y="268.0" fill="#c9d1d9" font-size="10" text-anchor="end" dominant-baseline="middle">$9,700</text><text x="62" y="216.0" fill="#c9d1d9" font-size="10" text-anchor="end" dominant-baseline="middle">$9,900</text><text x="62" y="164.0" fill="#c9d1d9" font-size="10" text-anchor="end" dominant-baseline="middle">$10,100</text><text x="62" y="112.0" fill="#c9d1d9" font-size="10" text-anchor="end" dominant-baseline="middle">$10,300</text><text x="62" y="60.0" fill="#c9d1d9" font-size="10" text-anchor="end" dominant-baseline="middle">$10,500</text>

  <!-- X-axis labels -->
  <text x="420.0" y="340" fill="#c9d1d9" font-size="10" text-anchor="middle">2026-05-13</text>

  <!-- Legend -->
  <circle cx="650" cy="380" r="4" fill="#16a34a"/>
  <text x="658" y="384" fill="#c9d1d9" font-size="9">Win</text>
  <circle cx="690" cy="380" r="4" fill="#dc2626"/>
  <text x="698" y="384" fill="#c9d1d9" font-size="9">Loss</text>
  <line x1="730" y1="380" x2="745" y2="380" stroke="#c9d1d9" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="750" y="384" fill="#c9d1d9" font-size="9">$10K baseline</text>
</svg>